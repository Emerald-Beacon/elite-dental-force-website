<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 68">
  <defs>
    <mask id="dotcut">
      <!-- Square fill (white = show) with circle cutouts (black = hide) -->
      <rect x="-27" y="-27" width="54" height="54" fill="white" rx="2"/>
      <!-- Large focal dot left -->
      <circle cx="-15" cy="-2" r="6.5" fill="black"/>
      <!-- Dot grid: top row -->
      <circle cx="-4" cy="-12" r="3.2" fill="black"/>
      <circle cx="3" cy="-12" r="2.4" fill="black"/>
      <circle cx="9" cy="-12" r="1.8" fill="black"/>
      <circle cx="14" cy="-12" r="1.2" fill="black"/>
      <!-- Dot grid: middle row -->
      <circle cx="-4" cy="-2" r="3.8" fill="black"/>
      <circle cx="3" cy="-2" r="2.8" fill="black"/>
      <circle cx="9" cy="-2" r="2" fill="black"/>
      <circle cx="14" cy="-2" r="1.4" fill="black"/>
      <!-- Dot grid: lower row -->
      <circle cx="-7" cy="8" r="2.8" fill="black"/>
      <circle cx="0" cy="8" r="2.1" fill="black"/>
      <circle cx="7" cy="8" r="1.6" fill="black"/>
      <circle cx="13" cy="8" r="1.1" fill="black"/>
    </mask>
  </defs>

  <!-- Tilted teal square with dot cutouts -->
  <g transform="translate(34,34) rotate(-22)">
    <rect x="-27" y="-27" width="54" height="54" fill="#00c4c4" rx="2" mask="url(#dotcut)"/>
  </g>

  <!-- "eagle" in italic gray serif + "soft" in bold teal sans-serif -->
  <text x="74" y="45" font-size="35" letter-spacing="-0.5">
    <tspan font-family="Georgia,'Times New Roman',serif" font-style="italic" font-weight="400" fill="#888888">eagle</tspan><tspan font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif" font-style="normal" font-weight="800" fill="#00c4c4">soft</tspan>
  </text>

  <!-- "a Patterson Technology" subtitle -->
  <text x="175" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9.5" fill="#888888">a Patterson Technology</text>
</svg>
