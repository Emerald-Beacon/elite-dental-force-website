<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="stage">
      <div class="dots"></div>
      <svg class="scene" viewBox="0 0 1200 675" fill="none">
        <defs>
          <linearGradient id="fall" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#4ba8f0" />
            <stop offset="0.55" stop-color="#ffb84b" />
            <stop offset="1" stop-color="#ff5a6a" />
          </linearGradient>
          <linearGradient id="fillFall" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ff5a6a" stop-opacity="0.22" />
            <stop offset="1" stop-color="#ff5a6a" stop-opacity="0" />
          </linearGradient>
          <radialGradient id="alarm" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#ff5a6a" stop-opacity="0.30" />
            <stop offset="1" stop-color="#ff5a6a" stop-opacity="0" />
          </radialGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="9" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <circle cx="850" cy="430" r="260" fill="url(#alarm)" />

        <!-- grid -->
        <g stroke="rgba(75,168,240,0.10)" stroke-width="1">
          <line x1="110" y1="160" x2="1090" y2="160" />
          <line x1="110" y1="260" x2="1090" y2="260" />
          <line x1="110" y1="360" x2="1090" y2="360" />
          <line x1="110" y1="460" x2="1090" y2="460" />
          <line x1="110" y1="560" x2="1090" y2="560" />
        </g>

        <!-- declining line, breaking at the drop -->
        <path
          d="M130 220 L280 200 L420 240 L560 225 L660 280"
          stroke="url(#fall)"
          stroke-width="5"
          stroke-linecap="round"
          filter="url(#glow)"
        />
        <!-- fracture gap, then steep fall -->
        <path
          d="M695 318 L760 400 L850 470 L980 540 L1075 568"
          stroke="#ff5a6a"
          stroke-width="5"
          stroke-linecap="round"
          filter="url(#glow)"
        />
        <path
          d="M695 318 L760 400 L850 470 L980 540 L1075 568 L1075 620 L695 620 Z"
          fill="url(#fillFall)"
        />

        <!-- fracture mark at break point -->
        <g
          transform="translate(677 300)"
          stroke="#ffb84b"
          stroke-width="4"
          stroke-linecap="round"
          filter="url(#glow)"
        >
          <path d="M-6 -28 L6 -10 L-4 4 L8 22" fill="none" />
        </g>

        <!-- warning triangle -->
        <g transform="translate(880 240)">
          <path
            d="M0 -58 L62 50 L-62 50 Z"
            fill="rgba(255,90,106,0.10)"
            stroke="#ff5a6a"
            stroke-width="4"
            stroke-linejoin="round"
            filter="url(#glow)"
          />
          <line
            x1="0"
            y1="-22"
            x2="0"
            y2="16"
            stroke="#ff5a6a"
            stroke-width="7"
            stroke-linecap="round"
          />
          <circle cx="0" cy="33" r="4.5" fill="#ff5a6a" />
        </g>

        <!-- pulse rings -->
        <circle cx="850" cy="470" r="14" fill="#ff5a6a" filter="url(#glow)" />
        <circle
          cx="850"
          cy="470"
          r="34"
          stroke="#ff5a6a"
          stroke-opacity="0.35"
          stroke-width="2"
        />
        <circle
          cx="850"
          cy="470"
          r="58"
          stroke="#ff5a6a"
          stroke-opacity="0.15"
          stroke-width="2"
        />

        <!-- small declining bars left bottom -->
        <g fill="rgba(75,168,240,0.4)">
          <rect x="150" y="560" width="40" height="60" rx="5" />
          <rect x="208" y="576" width="40" height="44" rx="5" />
          <rect
            x="266"
            y="590"
            width="40"
            height="30"
            rx="5"
            fill="rgba(255,184,75,0.45)"
          />
          <rect
            x="324"
            y="602"
            width="40"
            height="18"
            rx="5"
            fill="rgba(255,90,106,0.5)"
          />
        </g>
      </svg>
      <div class="vignette"></div>
    </div>
  </body>
</html>
