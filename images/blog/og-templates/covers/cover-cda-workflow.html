<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="stage">
      <div class="dots"></div>
      <svg class="scene" viewBox="0 0 1200 675" fill="none">
        <defs>
          <linearGradient id="timeline" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#095ba7" />
            <stop offset="0.5" stop-color="#4ba8f0" />
            <stop offset="1" stop-color="#ffd700" />
          </linearGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="8" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- clock motif top left -->
        <g transform="translate(220 190)">
          <circle
            r="95"
            fill="rgba(10,28,56,0.7)"
            stroke="rgba(75,168,240,0.4)"
            stroke-width="3"
          />
          <circle r="80" stroke="rgba(75,168,240,0.15)" stroke-width="1.5" />
          <g
            stroke="rgba(211,237,252,0.5)"
            stroke-width="3"
            stroke-linecap="round"
          >
            <line x1="0" y1="-70" x2="0" y2="-58" />
            <line x1="70" y1="0" x2="58" y2="0" />
            <line x1="0" y1="70" x2="0" y2="58" />
            <line x1="-70" y1="0" x2="-58" y2="0" />
          </g>
          <line
            x1="0"
            y1="0"
            x2="0"
            y2="-48"
            stroke="#4ba8f0"
            stroke-width="6"
            stroke-linecap="round"
            filter="url(#glow)"
          />
          <line
            x1="0"
            y1="0"
            x2="34"
            y2="18"
            stroke="#ffd700"
            stroke-width="5"
            stroke-linecap="round"
            filter="url(#glow)"
          />
          <circle r="8" fill="#4ba8f0" />
        </g>

        <!-- main timeline path snaking across -->
        <path
          d="M150 480 C 350 430, 480 530, 640 480 C 800 430, 880 380, 1060 330"
          stroke="url(#timeline)"
          stroke-width="5"
          stroke-linecap="round"
          filter="url(#glow)"
        />

        <!-- timeline nodes with task cards -->
        <g>
          <circle
            cx="250"
            cy="462"
            r="11"
            fill="#0a1f42"
            stroke="#4ba8f0"
            stroke-width="4"
          />
          <circle
            cx="460"
            cy="497"
            r="11"
            fill="#0a1f42"
            stroke="#4ba8f0"
            stroke-width="4"
          />
          <circle
            cx="680"
            cy="468"
            r="11"
            fill="#0a1f42"
            stroke="#4ba8f0"
            stroke-width="4"
          />
          <circle
            cx="890"
            cy="392"
            r="11"
            fill="#0a1f42"
            stroke="#ffd700"
            stroke-width="4"
          />
          <circle
            cx="1060"
            cy="330"
            r="13"
            fill="#ffd700"
            filter="url(#glow)"
          />
        </g>

        <!-- task cards above nodes -->
        <g transform="translate(195 330)">
          <rect
            width="150"
            height="76"
            rx="12"
            fill="rgba(10,28,56,0.85)"
            stroke="rgba(75,168,240,0.3)"
            stroke-width="1.5"
          />
          <circle cx="26" cy="26" r="9" stroke="#4ba8f0" stroke-width="2.5" />
          <path
            d="M21 26 L25 30 L32 21"
            stroke="#4ba8f0"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
          <rect
            x="46"
            y="20"
            width="80"
            height="8"
            rx="4"
            fill="rgba(211,237,252,0.4)"
          />
          <rect
            x="46"
            y="38"
            width="60"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.2)"
          />
          <rect
            x="20"
            y="54"
            width="100"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.15)"
          />
        </g>
        <g transform="translate(405 545)">
          <rect
            width="150"
            height="76"
            rx="12"
            fill="rgba(10,28,56,0.85)"
            stroke="rgba(75,168,240,0.3)"
            stroke-width="1.5"
          />
          <circle cx="26" cy="26" r="9" stroke="#4ba8f0" stroke-width="2.5" />
          <path
            d="M21 26 L25 30 L32 21"
            stroke="#4ba8f0"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
          <rect
            x="46"
            y="20"
            width="80"
            height="8"
            rx="4"
            fill="rgba(211,237,252,0.4)"
          />
          <rect
            x="46"
            y="38"
            width="60"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.2)"
          />
          <rect
            x="20"
            y="54"
            width="100"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.15)"
          />
        </g>
        <g transform="translate(625 310)">
          <rect
            width="150"
            height="76"
            rx="12"
            fill="rgba(10,28,56,0.85)"
            stroke="rgba(75,168,240,0.3)"
            stroke-width="1.5"
          />
          <circle cx="26" cy="26" r="9" stroke="#4ba8f0" stroke-width="2.5" />
          <path
            d="M21 26 L25 30 L32 21"
            stroke="#4ba8f0"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
          <rect
            x="46"
            y="20"
            width="80"
            height="8"
            rx="4"
            fill="rgba(211,237,252,0.4)"
          />
          <rect
            x="46"
            y="38"
            width="60"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.2)"
          />
          <rect
            x="20"
            y="54"
            width="100"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.15)"
          />
        </g>
        <g transform="translate(950 180)">
          <rect
            width="160"
            height="84"
            rx="12"
            fill="rgba(16,40,75,0.92)"
            stroke="rgba(255,215,0,0.45)"
            stroke-width="1.5"
          />
          <circle cx="28" cy="28" r="10" stroke="#ffd700" stroke-width="2.5" />
          <path
            d="M22 28 L27 33 L35 22"
            stroke="#ffd700"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
          <rect
            x="50"

            width="86"
            height="8"
            rx="4"
            fill="rgba(255,215,0,0.5)"
          />
          <rect
            x="50"

            width="64"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.25)"
          />
          <rect
            x="22"
            y="58"
            width="110"
            height="6"
            rx="3"
            fill="rgba(211,237,252,0.15)"
          />
        </g>

        <!-- connector stems from cards to nodes -->
        <g
          stroke="rgba(75,168,240,0.3)"
          stroke-width="2"
          stroke-dasharray="3 6"
        >
          <line x1="265" y1="406" x2="252" y2="450" />
          <line x1="478" y1="545" x2="462" y2="510" />
          <line x1="698" y1="386" x2="682" y2="456" />
          <line x1="1018" y1="264" x2="1056" y2="318" />
        </g>
      </svg>
      <div class="vignette"></div>
    </div>
  </body>
