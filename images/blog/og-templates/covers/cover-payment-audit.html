<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="stage">
      <div class="dots"></div>
      <svg class="scene" viewBox="0 0 1200 675" fill="none">
        <defs>
          <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="rgba(75,168,240,0.18)" />
            <stop offset="1" stop-color="rgba(9,91,167,0.05)" />
          </linearGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="9" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- ledger document -->
        <g transform="translate(190 100)">
          <rect
            width="600"
            height="470"
            rx="20"
            fill="rgba(10,28,56,0.85)"
            stroke="rgba(75,168,240,0.3)"
            stroke-width="2"
          />
          <!-- header band -->
          <rect
            x="36"
            y="34"
            width="200"
            height="14"
            rx="7"
            fill="rgba(211,237,252,0.45)"
          />
          <rect
            x="36"
            y="62"
            width="120"
            height="9"
            rx="4.5"
            fill="rgba(211,237,252,0.2)"
          />

          <!-- ledger rows -->
          <g>
            <rect
              x="36"
              y="104"
              width="528"
              height="44"
              rx="9"
              fill="rgba(75,168,240,0.07)"
            />
            <rect
              x="52"
              y="120"
              width="180"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.3)"
            />
            <rect
              x="420"
              y="120"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(75,168,240,0.55)"
            />
            <g transform="translate(540 126)">
              <path
                d="M-6 0 L-2 4 L6 -5"
                stroke="#4ba8f0"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
            </g>

            <rect
              x="36"
              y="160"
              width="528"
              height="44"
              rx="9"
              fill="rgba(75,168,240,0.05)"
            />
            <rect
              x="52"
              y="176"
              width="150"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.3)"
            />
            <rect
              x="420"
              y="176"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(75,168,240,0.55)"
            />
            <g transform="translate(540 182)">
              <path
                d="M-6 0 L-2 4 L6 -5"
                stroke="#4ba8f0"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
            </g>

            <!-- flagged underpaid row -->
            <rect
              x="36"
              y="216"
              width="528"
              height="44"
              rx="9"
              fill="rgba(255,215,0,0.10)"
              stroke="rgba(255,215,0,0.55)"
              stroke-width="2"
            />
            <rect
              x="52"
              y="232"
              width="200"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.4)"
            />
            <rect
              x="420"
              y="232"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(255,215,0,0.8)"
            />
            <g transform="translate(543 238)">
              <line
                x1="-7"
                y1="-7"
                x2="7"
                y2="7"
                stroke="#ffd700"
                stroke-width="3.5"
                stroke-linecap="round"
              />
              <line
                x1="7"
                y1="-7"
                x2="-7"
                y2="7"
                stroke="#ffd700"
                stroke-width="3.5"
                stroke-linecap="round"
              />
            </g>

            <rect
              x="36"
              y="272"
              width="528"
              height="44"
              rx="9"
              fill="rgba(75,168,240,0.05)"
            />
            <rect
              x="52"
              y="288"
              width="170"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.3)"
            />
            <rect
              x="420"
              y="288"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(75,168,240,0.55)"
            />
            <g transform="translate(540 294)">
              <path
                d="M-6 0 L-2 4 L6 -5"
                stroke="#4ba8f0"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
            </g>

            <rect
              x="36"
              y="328"
              width="528"
              height="44"
              rx="9"
              fill="rgba(75,168,240,0.07)"
            />
            <rect
              x="52"
              y="344"
              width="190"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.3)"
            />
            <rect
              x="420"
              y="344"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(75,168,240,0.55)"
            />
            <g transform="translate(540 350)">
              <path
                d="M-6 0 L-2 4 L6 -5"
                stroke="#4ba8f0"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
            </g>

            <rect
              x="36"
              y="384"
              width="528"
              height="44"
              rx="9"
              fill="rgba(75,168,240,0.05)"
            />
            <rect
              x="52"
              y="400"
              width="140"
              height="11"
              rx="5.5"
              fill="rgba(211,237,252,0.3)"
            />
            <rect
              x="420"
              y="400"
              width="80"
              height="11"
              rx="5.5"
              fill="rgba(75,168,240,0.55)"
            />
            <g transform="translate(540 406)">
              <path
                d="M-6 0 L-2 4 L6 -5"
                stroke="#4ba8f0"
                stroke-width="3"
                stroke-linecap="round"
                fill="none"
              />
            </g>
          </g>
        </g>

        <!-- magnifier over flagged row -->
        <g transform="translate(820 330)">
          <circle
            r="130"
            fill="url(#lens)"
            stroke="#4ba8f0"
            stroke-width="7"
            filter="url(#glow)"
          />
          <circle r="130" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
          <line
            x1="92"
            y1="92"
            x2="200"
            y2="200"
            stroke="#4ba8f0"
            stroke-width="22"
            stroke-linecap="round"
          />
          <line
            x1="96"
            y1="96"
            x2="196"
            y2="196"
            stroke="#0a2347"
            stroke-width="10"
            stroke-linecap="round"
          />
          <!-- magnified delta inside lens: bar vs expected bar -->
          <g>
            <rect
              x="-72"
              y="-12"
              width="58"
              height="64"
              rx="8"
              fill="rgba(75,168,240,0.6)"
            />
            <rect
              x="8"
              y="-52"
              width="58"
              height="104"
              rx="8"
              fill="rgba(255,215,0,0.25)"
              stroke="#ffd700"
              stroke-width="2.5"
              stroke-dasharray="7 6"
            />
            <path
              d="M-43 -34 L-43 -56 M-43 -56 L-52 -46 M-43 -56 L-34 -46"
              stroke="#ffd700"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </g>
        </g>

        <!-- recovered value sparkle -->
        <g
          transform="translate(1040 140)"
          stroke="#ffd700"
          stroke-width="3"
          stroke-linecap="round"
          filter="url(#glow)"
        >
          <line x1="0" y1="-16" x2="0" y2="16" />
          <line x1="-16" y1="0" x2="16" y2="0" />
          <line x1="-10" y1="-10" x2="10" y2="10" opacity="0.5" />
          <line x1="10" y1="-10" x2="-10" y2="10" opacity="0.5" />
        </g>
      </svg>
      <div class="vignette"></div>
    </div>
  </body>
</html>
