<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="stage">
      <div class="dots"></div>
      <svg class="scene" viewBox="0 0 1200 675" fill="none">
        <defs>
          <linearGradient id="die" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#123d75" />
            <stop offset="1" stop-color="#0a1f42" />
          </linearGradient>
          <linearGradient id="dieCore" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4ba8f0" />
            <stop offset="1" stop-color="#095ba7" />
          </linearGradient>
          <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#4ba8f0" />
            <stop offset="1" stop-color="#4ba8f0" stop-opacity="0" />
          </linearGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="9" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- chip package -->
        <g transform="translate(600 338)">
          <!-- pins -->
          <g
            stroke="rgba(75,168,240,0.5)"
            stroke-width="5"
            stroke-linecap="round"
          >
            <line x1="-150" y1="-180" x2="-150" y2="-208" />
            <line x1="-90" y1="-180" x2="-90" y2="-208" />
            <line x1="-30" y1="-180" x2="-30" y2="-208" />
            <line x1="30" y1="-180" x2="30" y2="-208" />
            <line x1="90" y1="-180" x2="90" y2="-208" />
            <line x1="150" y1="-180" x2="150" y2="-208" />
            <line x1="-150" y1="180" x2="-150" y2="208" />
            <line x1="-90" y1="180" x2="-90" y2="208" />
            <line x1="-30" y1="180" x2="-30" y2="208" />
            <line x1="30" y1="180" x2="30" y2="208" />
            <line x1="90" y1="180" x2="90" y2="208" />
            <line x1="150" y1="180" x2="150" y2="208" />
            <line x1="-180" y1="-150" x2="-208" y2="-150" />
            <line x1="-180" y1="-90" x2="-208" y2="-90" />
            <line x1="-180" y1="-30" x2="-208" y2="-30" />
            <line x1="-180" y1="30" x2="-208" y2="30" />
            <line x1="-180" y1="90" x2="-208" y2="90" />
            <line x1="-180" y1="150" x2="-208" y2="150" />
            <line x1="180" y1="-150" x2="208" y2="-150" />
            <line x1="180" y1="-90" x2="208" y2="-90" />
            <line x1="180" y1="-30" x2="208" y2="-30" />
            <line x1="180" y1="30" x2="208" y2="30" />
            <line x1="180" y1="90" x2="208" y2="90" />
            <line x1="180" y1="150" x2="208" y2="150" />
          </g>
          <!-- body -->
          <rect
            x="-180"
            y="-180"
            width="360"
            height="360"
            rx="28"
            fill="url(#die)"
            stroke="rgba(75,168,240,0.45)"
            stroke-width="2.5"
          />
          <!-- inner die -->
          <rect
            x="-110"
            y="-110"
            width="220"
            height="220"
            rx="18"
            fill="rgba(4,16,39,0.9)"
            stroke="rgba(75,168,240,0.3)"
            stroke-width="1.5"
          />
          <!-- core -->
          <rect
            x="-52"
            y="-52"
            width="104"
            height="104"
            rx="14"
            fill="url(#dieCore)"
            filter="url(#glow)"
          />
          <!-- neural spark in core: node triangle -->
          <g stroke="#031022" stroke-width="4" stroke-linecap="round">
            <circle cx="0" cy="-18" r="7" fill="#031022" />
            <circle cx="-20" cy="16" r="7" fill="#031022" />
            <circle cx="20" cy="16" r="7" fill="#031022" />
            <line x1="0" y1="-18" x2="-20" y2="16" />
            <line x1="0" y1="-18" x2="20" y2="16" />
            <line x1="-20" y1="16" x2="20" y2="16" />
          </g>
          <!-- inner trace squares -->
          <g stroke="rgba(75,168,240,0.35)" stroke-width="1.5" fill="none">
            <path d="M-110 -70 L-70 -70 L-70 -110" />
            <path d="M110 -70 L70 -70 L70 -110" />
            <path d="M-110 70 L-70 70 L-70 110" />
            <path d="M110 70 L70 70 L70 110" />
          </g>
        </g>

        <!-- radiating board traces with terminal nodes -->
        <g stroke="rgba(75,168,240,0.4)" stroke-width="2.5" fill="none">
          <path d="M390 248 L 300 248 L 260 208 L 150 208" />
          <path d="M390 428 L 290 428 L 250 468 L 140 468" />
          <path d="M810 248 L 900 248 L 940 208 L 1050 208" />
          <path d="M810 428 L 910 428 L 950 468 L 1060 468" />
          <path d="M600 118 L 600 60" />
          <path d="M600 558 L 600 615" />
        </g>
        <g fill="#4ba8f0" filter="url(#glow)">
          <circle cx="150" cy="208" r="6" />
          <circle cx="140" cy="468" r="6" />
          <circle cx="1050" cy="208" r="6" />
          <circle cx="1060" cy="468" r="6" />
          <circle cx="600" cy="60" r="6" />
          <circle cx="600" cy="615" r="6" />
        </g>

        <!-- gold accent: performance pulse along one trace -->
        <circle cx="940" cy="208" r="8" fill="#ffd700" filter="url(#glow)" />
      </svg>
      <div class="vignette"></div>
    </div>
  </body>
</html>
