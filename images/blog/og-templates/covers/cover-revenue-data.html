<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="stage">
      <div class="dots"></div>
      <svg class="scene" viewBox="0 0 1200 675" fill="none">
        <defs>
          <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffd700" />
            <stop offset="1" stop-color="#b8960a" />
          </linearGradient>
          <linearGradient id="coinFace" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#1a3c6e" />
            <stop offset="1" stop-color="#0a1f42" />
          </linearGradient>
          <radialGradient id="burst" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#4ba8f0" stop-opacity="0.35" />
            <stop offset="1" stop-color="#4ba8f0" stop-opacity="0" />
          </radialGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="8" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <circle cx="800" cy="320" r="300" fill="url(#burst)" />

        <!-- fragmenting data point cloud (left, locked away) -->
        <g>
          <g stroke="rgba(75,168,240,0.18)" stroke-width="1">
            <line x1="150" y1="180" x2="240" y2="240" />
            <line x1="240" y1="240" x2="200" y2="340" />
            <line x1="200" y1="340" x2="300" y2="300" />
            <line x1="240" y1="240" x2="300" y2="300" />
            <line x1="300" y1="300" x2="370" y2="380" />
            <line x1="200" y1="340" x2="260" y2="440" />
            <line x1="260" y1="440" x2="370" y2="380" />
            <line x1="150" y1="180" x2="280" y2="150" />
            <line x1="280" y1="150" x2="240" y2="240" />
            <line x1="370" y1="380" x2="430" y2="290" />
            <line x1="300" y1="300" x2="430" y2="290" />
            <line x1="260" y1="440" x2="330" y2="500" />
          </g>
          <g fill="#4ba8f0">
            <circle cx="150" cy="180" r="5" opacity="0.9" />
            <circle cx="280" cy="150" r="4" opacity="0.6" />
            <circle
              cx="240"
              cy="240"
              r="6"
              opacity="0.95"
              filter="url(#glow)"
            />
            <circle cx="200" cy="340" r="4.5" opacity="0.7" />
            <circle cx="300" cy="300" r="5" opacity="0.85" />
            <circle cx="370" cy="380" r="4" opacity="0.6" />
            <circle cx="430" cy="290" r="3.5" opacity="0.5" />
            <circle cx="260" cy="440" r="3.5" opacity="0.5" />
            <circle cx="330" cy="500" r="2.5" opacity="0.35" />
          </g>
        </g>

        <!-- flow from cloud into value (center arrows) -->
        <path
          d="M470 320 C 560 310, 590 320, 650 330"
          stroke="rgba(75,168,240,0.5)"
          stroke-width="3"
          stroke-linecap="round"
          stroke-dasharray="2 14"
        />
        <path
          d="M470 360 C 560 380, 590 390, 645 392"
          stroke="rgba(75,168,240,0.3)"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-dasharray="2 14"
        />

        <!-- coin stack (right) -->
        <g transform="translate(690 200)">
          <g>
            <ellipse
              cx="110"
              cy="330"
              rx="150"
              ry="44"
              fill="#071427"
              opacity="0.8"
            />
            <!-- stacked coins -->
            <g>
              <ellipse
                cx="110"
                cy="300"
                rx="130"
                ry="38"
                fill="url(#coin)"
                opacity="0.25"
              />
              <ellipse
                cx="110"
                cy="290"
                rx="130"
                ry="38"
                fill="#0e2a52"
                stroke="rgba(255,215,0,0.4)"
                stroke-width="1.5"
              />
              <ellipse
                cx="110"
                cy="250"
                rx="130"
                ry="38"
                fill="url(#coin)"
                opacity="0.3"
              />
              <ellipse
                cx="110"
                cy="240"
                rx="130"
                ry="38"
                fill="#10305e"
                stroke="rgba(255,215,0,0.5)"
                stroke-width="1.5"
              />
              <ellipse
                cx="110"
                cy="200"
                rx="130"
                ry="38"
                fill="url(#coin)"
                opacity="0.35"
              />
              <ellipse
                cx="110"
                cy="190"
                rx="130"
                ry="38"
                fill="#123769"
                stroke="rgba(255,215,0,0.6)"
                stroke-width="1.5"
              />
              <ellipse
                cx="110"
                cy="150"
                rx="130"
                ry="38"
                fill="url(#coin)"
                opacity="0.4"
              />
              <ellipse
                cx="110"
                cy="140"
                rx="130"
                ry="38"
                fill="url(#coinFace)"
                stroke="#ffd700"
                stroke-width="2.5"
                filter="url(#glow)"
              />
            </g>
            <!-- dollar mark as pure shape: vertical bar + S-curve -->
            <g
              transform="translate(110 140)"
              stroke="#ffd700"
              stroke-width="7"
              stroke-linecap="round"
              filter="url(#glow)"
            >
              <path
                d="M22 -14 C 22 -26, -22 -26, -22 -10 C -22 4, 22 -2, 22 12 C 22 26, -22 26, -22 14"
                fill="none"
              />
              <line x1="0" y1="-34" x2="0" y2="-24" />
              <line x1="0" y1="24" x2="0" y2="34" />
            </g>
          </g>
        </g>

        <!-- rising sparkline beneath -->
        <path
          d="M160 600 L320 580 L480 590 L640 555 L800 565 L960 520 L1080 500"
          stroke="rgba(75,168,240,0.55)"
          stroke-width="3"
          stroke-linecap="round"
          filter="url(#glow)"
        />
        <circle cx="1080" cy="500" r="6" fill="#4ba8f0" filter="url(#glow)" />
      </svg>
      <div class="vignette"></div>
    </div>
  </body>
</html>
