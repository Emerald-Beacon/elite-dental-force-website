  <style>

    .err-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .err-grid {
      position: absolute; inset: 0;

        linear-gradient(90deg, rgba(75,168,240,0.045) 1px, transparent 1px);

      pointer-events: none;
    }
    .err-grid::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, #020917 100%);
    }
    .err-orb {
      position: absolute; border-radius: 50%; pointer-events: none;
      filter: blur(120px);
    }
    .err-orb--1 { width: 500px; height: 500px; background: #001f71; opacity: 0.45; top: -100px; left: -150px; }

    .err-inner {
      position: relative; z-index: 2;
      text-align: center;
      max-width: 560px;
    }
    .err-code {
      font-size: clamp(7rem, 18vw, 11rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, #4ba8f0 50%, #3454f8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 0.5rem;
      letter-spacing: -0.04em;
    }
    .err-title {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      color: #f0f7ff;
      margin: 0 0 1rem;
    }
    .err-desc {
      font-size: 1rem;
      color: rgba(133,184,216,0.75);
      line-height: 1.65;
      margin: 0 0 2.5rem;
    }
    .err-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .err-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .err-btn--primary {
      background: linear-gradient(135deg, #095ba7, #4ba8f0);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(75,168,240,0.3);
    }
    .err-btn--primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(75,168,240,0.4); }
    .err-btn--outline {
      background: transparent;
      color: rgba(133,184,216,0.8);
      border: 1px solid rgba(75,168,240,0.25);
    }
    .err-btn--outline:hover { border-color: rgba(75,168,240,0.5); color: #f0f7ff; background: rgba(75,168,240,0.06); }
    .err-links {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(75,168,240,0.1);
    }
    .err-links p {
      font-size: 12px;
      color: rgba(133,184,216,0.5);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .err-links-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .err-links a {
      font-size: 13px;
      color: #4ba8f0;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .err-links a:hover { opacity: 1; }
