[build]
  publish = "."

# Redirect rules
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/pages/resources/blog.html"
  status = 301

[[redirects]]
  from = "/revnet"
  to = "/pages/revnet.html"
  status = 301

[[redirects]]
  from = "/dental-revenue-intelligence"
  to = "/pages/dental-revenue-intelligence.html"
  status = 301

[[redirects]]
  from = "/demo"
  to = "https://b.elitedentalforce.com/widget/bookings/outsource-edf-30mins-consultation/edf-team"
  status = 302

[[redirects]]
  from = "/book"
  to = "https://b.elitedentalforce.com/widget/bookings/outsource-edf-30mins-consultation/edf-team"
  status = 302

# Custom error pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[build.environment]
  NODE_VERSION = "18"
