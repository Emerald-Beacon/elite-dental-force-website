[build]
  publish = "."
  functions = "netlify/functions"

# Redirect rules
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/pages/resources/blog.html"
  status = 301

[[redirects]]
  from = "/revnet"
  to = "/pages/revnet.html"
  status = 301

[[redirects]]
  from = "/dental-revenue-intelligence"
  to = "/pages/dental-revenue-intelligence.html"
  status = 301

[[redirects]]
  from = "/eligibility-intelligence"
  to = "/pages/eligibility-intelligence.html"
  status = 301

[[redirects]]
  from = "/ai-claim-scrubbing"
  to = "/pages/ai-claim-scrubbing.html"
  status = 301

[[redirects]]
  from = "/denial-prevention"
  to = "/pages/denial-prevention.html"
  status = 301

[[redirects]]
  from = "/demo"
  to = "https://api.leadconnectorhq.com/widget/bookings/alvin-calendar"
  status = 302

[[redirects]]
  from = "/book"
  to = "https://api.leadconnectorhq.com/widget/bookings/alvin-calendar"
  status = 302

# Custom error pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[build.environment]
  NODE_VERSION = "18"
